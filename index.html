<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Aircraft War Clone</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app-shell theme-art">
    <main class="game-layout game-layout--single">
      <section class="game-card game-card--wide">
        <div class="canvas-frame">
          <div class="top-score" id="scoreHud">分數 0</div>
          <canvas id="gameCanvas" width="480" height="800" aria-label="Aircraft War Clone 遊戲區域"></canvas>
          <div class="touch-hint">手機可拖曳飛機移動</div>

          <div class="overlay visible" id="menuOverlay">
            <div class="panel art-panel art-panel--start menu-panel">
              <div class="panel-art panel-art--start" aria-hidden="true"></div>
              <div class="panel-logo" aria-hidden="true"></div>
              <p class="eyebrow">空戰行動</p>
              <h2>Aircraft War Clone</h2>
              <p>擊落敵機、擊敗關卡 Boss，逐步突破戰區。</p>
              <div class="menu-buttons">
                <button id="startButton" class="action-button">開始遊戲</button>
                <button id="shopButton" class="action-button action-button--secondary">強化商店</button>
                <button id="rankingButton" class="action-button action-button--secondary">排行榜</button>
              </div>
            </div>
          </div>

          <div class="overlay" id="shopOverlay">
            <div class="panel shop-panel">
              <p class="eyebrow">強化商店</p>
              <h2>機體強化</h2>
              <p class="shop-coins" id="coinValue">金幣：0</p>
              <div class="shop-list" id="shopList"></div>
              <button id="rechargeButton" class="action-button">前往儲值</button>
              <button id="closeShopButton" class="action-button action-button--secondary">返回主選單</button>
            </div>
          </div>

          <div class="overlay" id="rankingOverlay">
            <div class="panel ranking-panel">
              <p class="eyebrow">排行榜</p>
              <h2>前 10 名</h2>
              <ol class="ranking-list" id="rankingList"></ol>
              <button id="closeRankingButton" class="action-button action-button--secondary">返回主選單</button>
            </div>
          </div>

          <div class="overlay" id="gameOverOverlay">
            <div class="panel art-panel art-panel--gameover">
              <div class="panel-art panel-art--gameover" aria-hidden="true"></div>
              <p class="eyebrow">任務失敗</p>
              <h2>遊戲結束</h2>
              <p id="gameOverSummary">分數：0</p>
              <label class="input-label" for="playerNameInput">輸入玩家名稱</label>
              <input id="playerNameInput" class="name-input" maxlength="12" placeholder="請輸入名稱">
              <div class="menu-buttons">
                <button id="saveScoreButton" class="action-button">送出成績</button>
                <button id="restartButton" class="action-button action-button--secondary">回主選單</button>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
